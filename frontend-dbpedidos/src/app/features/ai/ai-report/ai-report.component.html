<div class="ai-report-container">
  <h2><i class="fas fa-brain"></i> Reporte Inteligente con IA</h2>
  <p class="ai-report-desc">Describe en lenguaje natural qué reporte necesitas. La IA analizará los datos del negocio y generará un reporte detallado.</p>

  <div class="ai-report-form">
    <div class="form-group">
      <label>¿Qué reporte deseas?</label>
      <textarea
        [(ngModel)]="prompt"
        placeholder="Ej: Dame un análisis de ventas de este mes, comparado con el mes anterior. Quiero ver tendencias y recomendaciones."
        rows="3"
        [disabled]="loading()"
      ></textarea>
    </div>

    <div class="form-group">
      <label>Período de análisis</label>
      <select [(ngModel)]="period" [disabled]="loading()">
        <option value="semana">Última semana</option>
        <option value="mes">Último mes</option>
        <option value="trimestre">Último trimestre</option>
        <option value="año">Último año</option>
      </select>
    </div>

    <button class="generate-btn" (click)="generateReport()" [disabled]="loading() || !prompt.trim()">
      @if (loading()) {
        <i class="fas fa-spinner fa-spin"></i> Generando...
      } @else {
        <i class="fas fa-magic"></i> Generar Reporte
      }
    </button>
  </div>

  @if (report()) {
    <div class="ai-report-result">
      <div class="report-header">
        <i class="fas fa-file-alt"></i>
        <h3>Reporte Generado</h3>
      </div>
      <div class="report-content">{{ report() }}</div>
    </div>
  }
</div>
