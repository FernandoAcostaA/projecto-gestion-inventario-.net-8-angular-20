name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # =========================
  # BUILD & TEST JOB
  # =========================
  build:
    runs-on: ubuntu-latest
    name: Build and Test
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencias
      run: dotnet restore
    
    - name: Build solución
      run: dotnet build --configuration Release --no-restore
    
    - name: Ejecutar pruebas unitarias
      run: dotnet test --configuration Release --no-build --verbosity normal --logger="trx;LogFileName=test-results.trx"
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'
    
    - name: Generar artefactos de publicación
      run: dotnet publish PedidosApi/PedidosApi.csproj --configuration Release --output ./publish
    
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: build-artifact
        path: ./publish
        retention-days: 5

  # =========================
  # CODE QUALITY & LINT JOB
  # =========================
  quality:
    runs-on: ubuntu-latest
    name: Code Quality Analysis
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencias
      run: dotnet restore
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      with:
        args: >
          -Dsonar.projectKey=pedidos-api
          -Dsonar.organization=your-org
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: Install StyleCop analyzers
      run: dotnet add PedidosApi/PedidosApi.csproj package StyleCop.Analyzers
    
    - name: Build con análisis de estilo
      run: dotnet build --configuration Release /p:EnforceCodeStyleInBuild=true

  # =========================
  # SECURITY & DEPENDENCIES
  # =========================
  security:
    runs-on: ubuntu-latest
    name: Security Analysis
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Check for vulnerable NuGet packages
      run: |
        dotnet list package --vulnerable

  # =========================
  # DOCKER BUILD
  # =========================
  docker:
    needs: [build, quality]
    runs-on: ubuntu-latest
    name: Build Docker Image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Download Build Artifact
      uses: actions/download-artifact@v3
      with:
        name: build-artifact
        path: ./publish
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        tags: pedidos-api:latest
        outputs: type=docker,dest=/tmp/pedidos-api.tar
    
    - name: Upload Docker image
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: /tmp/pedidos-api.tar
        retention-days: 5

  # =========================
  # NOTIFICATION
  # =========================
  notify:
    needs: [build, quality, security]
    runs-on: ubuntu-latest
    name: Notify Results
    if: always()
    
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      if: always()
      with:
        status: ${{ job.status }}
        text: 'CI Pipeline - Build ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author
      continue-on-error: true
