name: CD Pipeline - Deployment

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =========================
  # DEPLOY STAGING
  # =========================
  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore and Build
      run: |
        dotnet restore
        dotnet build --configuration Release --no-restore
    
    - name: Publish para Staging
      run: dotnet publish PedidosApi/PedidosApi.csproj --configuration Release --output ./staging-build
    
    - name: Deploy to Azure App Service (Staging)
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'pedidos-api-staging'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_STAGING }}
        package: './staging-build'
    
    - name: Health Check Staging
      run: |
        curl -f https://pedidos-api-staging.azurewebsites.net/health || exit 1
      continue-on-error: true

  # =========================
  # DEPLOY PRODUCTION (Manual Approval)
  # =========================
  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://pedidos-api.azurewebsites.net
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore and Build
      run: |
        dotnet restore
        dotnet build --configuration Release --no-restore
    
    - name: Publish para Production
      run: dotnet publish PedidosApi/PedidosApi.csproj --configuration Release --output ./prod-build
    
    - name: Deploy to Azure App Service (Production)
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'pedidos-api'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: './prod-build'
    
    - name: Health Check Production
      run: |
        curl -f https://pedidos-api.azurewebsites.net/health || exit 1
    
    - name: Notify Slack - Deployment Success
      uses: 8398a7/action-slack@v3
      with:
        status: 'success'
        text: '✅ Production Deployment Successful'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,ref
      if: success()
    
    - name: Notify Slack - Deployment Failed
      uses: 8398a7/action-slack@v3
      with:
        status: 'failure'
        text: '❌ Production Deployment Failed'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,ref
      if: failure()

  # =========================
  # PUSH DOCKER IMAGE
  # =========================
  push-docker:
    runs-on: ubuntu-latest
    name: Push Docker Image to Registry
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=sha
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
